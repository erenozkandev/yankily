<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming Soon</title>
  <style>
    :root {
      --bg-warm: #f6ebde;
      --bg-cool: #dceee7;
      --ink: #112133;
      --muted: #415367;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-border: rgba(17, 33, 51, 0.15);
      --accent: #0f625d;
      --accent-soft: rgba(15, 98, 93, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 20% -10%, #ffe4c5 0%, transparent 55%),
        radial-gradient(900px 600px at 100% 0%, #c7e7dc 0%, transparent 52%),
        linear-gradient(140deg, var(--bg-warm), var(--bg-cool));
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(2px);
      pointer-events: none;
      animation: drift 16s ease-in-out infinite alternate;
    }

    body::before {
      width: 320px;
      height: 320px;
      left: -110px;
      bottom: -80px;
      background: rgba(255, 199, 140, 0.32);
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -70px;
      top: 40px;
      background: rgba(123, 201, 184, 0.35);
      animation-delay: 1.5s;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: clamp(28px, 4vw, 44px);
      backdrop-filter: blur(8px);
      box-shadow:
        0 20px 55px rgba(17, 33, 51, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      animation: rise 700ms ease-out both;
    }

    .eyebrow {
      margin: 0 0 14px;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 20px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.65);
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(17, 33, 51, 0.2);
    }

    .brand-name {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #0f2f3c;
    }

    h1 {
      margin: 0;
      line-height: 1.1;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: -0.03em;
      max-width: 18ch;
    }

    .copy {
      margin: 18px 0 24px;
      color: var(--muted);
      font-size: clamp(1rem, 1.9vw, 1.15rem);
      line-height: 1.65;
      max-width: 58ch;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 15px;
      border-radius: 999px;
      border: 1px solid var(--accent-soft);
      background: rgba(255, 255, 255, 0.62);
      color: #143643;
      font-size: 0.95rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(15, 98, 93, 0.45);
      animation: pulse 2s ease-out infinite;
    }

    .footnote {
      margin: 26px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      opacity: 0.9;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(15, 98, 93, 0.45); }
      70% { box-shadow: 0 0 0 10px rgba(15, 98, 93, 0); }
      100% { box-shadow: 0 0 0 0 rgba(15, 98, 93, 0); }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(12px, -10px, 0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img
        class="brand-icon"
        src="empty/empty/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"
        alt="Yankily app icon"
      >
      <span class="brand-name">Yankily</span>
    </div>
    <p class="eyebrow">Private Build</p>
    <h1>Something thoughtful is on the way.</h1>
    <p class="copy">
      A new experience is being crafted behind the scenes.
      Public details will appear here when everything is ready.
    </p>
    <div class="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      Launch updates coming soon
    </div>
    <p class="footnote">Thank you for your patience.</p>
  </main>
</body>
</html>
